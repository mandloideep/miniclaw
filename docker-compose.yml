services:
  ollama:
    image: ollama/ollama:latest
    container_name: miniclaw-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  ollama-models:
    name: miniclaw-ollama-models
